version: '3.8'

services:
  backend:
    build: ./backend
    container_name: demo-backend
    ports:
      - "5000:5000"
    networks:
      - app-network
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: demo-frontend
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
