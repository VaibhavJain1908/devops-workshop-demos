services:
  backend:
    build: ./backend
    networks:
      - app-network
    # No port mapping - internal only

  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    networks:
      - app-network
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - nginx

networks:
  app-network:
    driver: bridge