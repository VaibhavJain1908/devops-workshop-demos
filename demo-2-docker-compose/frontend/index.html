<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Container Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 32px;
        }
        .status {
            margin: 20px 0;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        .status p {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }
        .status strong {
            color: #667eea;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 20px 0;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #result {
            margin-top: 30px;
            font-size: 18px;
            color: #333;
        }
        .result-box {
            background: #667eea;
            color: white;
            padding: 30px;
            border-radius: 15px;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-box h2 {
            font-size: 48px;
            margin: 10px 0;
        }
        .info {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
        .info p {
            margin: 10px 0;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            padding: 5px 15px;
            background: #4CAF50;
            color: white;
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
        }
        .badge.warning {
            background: #ff9800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#x1F433;</div>
        <h1>Multi-Container Demo</h1>
        
        <div class="status">
            <p><strong>Frontend Container:</strong> <span class="badge">&#x2705; Running</span></p>
            <p><strong>Backend Container:</strong> <span id="backend-status" class="badge warning">Checking...</span></p>
        </div>
        
        <p style="margin: 20px 0; color: #666;">Frontend talking to Backend via Docker network</p>
        
        <button onclick="getCount()">Get Visitor Count</button>
        
        <div id="result"></div>
        
        <div class="info">
            <p>&#x1F4A1; Each click increments the counter in backend</p>
            <p>&#x1F504; Containers communicate via internal network</p>
            <p>&#x1F4E6; Both services running in Docker</p>
        </div>
    </div>

    <script>
        async function checkBackend() {
            try {
                const response = await fetch('http://localhost:5000/api/health');
                const data = await response.json();
                document.getElementById('backend-status').innerHTML = '&#x2705; Running';
                document.getElementById('backend-status').className = 'badge';
            } catch (error) {
                document.getElementById('backend-status').innerHTML = '&#x274C; Not responding';
                document.getElementById('backend-status').className = 'badge warning';
            }
        }

        async function getCount() {
            try {
                const response = await fetch('http://localhost:5000/api/count');
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <div class="result-box">
                        <div style="font-size: 64px;">&#x1F389;</div>
                        <h2>Visitors: ${data.count}</h2>
                        <p style="margin-top: 15px;">${data.message}</p>
                        <p style="font-size: 14px; margin-top: 10px; opacity: 0.9;">
                            Uptime: ${data.uptime}
                        </p>
                        <p style="font-size: 12px; margin-top: 5px; opacity: 0.8;">
                            Container: ${data.container}
                        </p>
                    </div>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<p style="color: red;">&#x274C; Error connecting to backend!</p>';
            }
        }

        // Check backend on load
        checkBackend();
        
        // Refresh backend status every 5 seconds
        setInterval(checkBackend, 5000);
    </script>
</body>
</html>
