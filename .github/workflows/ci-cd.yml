name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'demo-4-cicd/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'demo-4-cicd/**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      working-directory: ./demo-4-cicd
      run: |
        pip install -r requirements.txt
        pip install pytest flake8
    
    - name: Lint with flake8
      working-directory: ./demo-4-cicd
      run: |
        flake8 app.py --max-line-length=100
    
    - name: Run tests
      working-directory: ./demo-4-cicd
      run: |
        pytest test_app.py -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: ./demo-4-cicd
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
          ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}
        load: false
    
    - name: Image digest
      run: echo "✅ Image pushed to Docker Hub!"

  deploy:
    name: Deploy and Test Container
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Pull latest image
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
    
    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name cicd-demo ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
    
    - name: Wait for container to start
      run: |
        echo "Waiting for container to be ready..."
        sleep 5
    
    - name: Check container health
      run: |
        echo "🔍 Checking if container is running..."
        docker ps | grep cicd-demo
    
    - name: View container logs
      run: |
        echo "📋 Container logs:"
        docker logs cicd-demo
    
    - name: Detailed API testing
      run: |
        echo "🧪 Running comprehensive API tests..."
        
        # Test home endpoint
        response=$(curl -s http://localhost:5000/)
        echo "Home Response: $response"
        
        # Parse JSON and check fields
        message=$(echo $response | jq -r '.message')
        version=$(echo $response | jq -r '.version')
        
        if [ "$message" = "CI/CD Demo App" ]; then
          echo "✅ Message field correct"
        else
          echo "❌ Message field incorrect"
          exit 1
        fi
        
        if [ "$version" = "1.0.0" ]; then
          echo "✅ Version field correct"
        else
          echo "❌ Version field incorrect: $version"
          exit 1
        fi
        
        # Test health endpoint
        health_status=$(curl -s http://localhost:5000/health | jq -r '.status')
        
        if [ "$health_status" = "healthy" ]; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed"
          exit 1
        fi
        
        echo "🎉 All API tests passed!"
    
    - name: Performance test
      run: |
        echo "⚡ Running performance test..."
        for i in {1..10}; do
          curl -s http://localhost:5000/ > /dev/null
          echo "Request $i completed"
        done
        echo "✅ Performance test passed!"
    
    - name: Container stats
      run: |
        echo "📊 Container resource usage:"
        docker stats --no-stream cicd-demo
    
    - name: Cleanup
      if: always()
      run: |
        echo "🧹 Cleaning up..."
        docker stop cicd-demo || true
        docker rm cicd-demo || true
    
    - name: Deployment summary
      run: |
        echo "🎉 Deployment successful!"
        echo "📦 Image: ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest"
        echo "🏷️  Commit: ${{ github.sha }}"
        echo "✅ All health checks passed!"