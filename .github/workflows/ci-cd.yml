name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'demo-4-cicd/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'demo-4-cicd/**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      working-directory: ./demo-4-cicd
      run: |
        pip install -r requirements.txt
        pip install pytest flake8
    
    - name: Lint with flake8
      working-directory: ./demo-4-cicd
      run: |
        flake8 app.py --max-line-length=100 --ignore=E501
    
    - name: Run tests
      working-directory: ./demo-4-cicd
      run: |
        pytest test_app.py -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: ./demo-4-cicd
        file: ./demo-4-cicd/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
          ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}
    
    - name: Image digest
      run: echo "✅ Image pushed successfully to Docker Hub!"

  deploy:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy notification
      run: |
        echo "🚀 Deploying to production..."
        echo "📦 Image: ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}"
        echo "✅ Deployment complete!"